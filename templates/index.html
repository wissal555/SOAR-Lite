<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>SOAR Lite Dashboard</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
        body { background-color: #0f0f0f; color: #00ff00; font-family: 'Courier New', Courier, monospace; }
        .card { background-color: #1a1a1a; border: 1px solid #333; }
        .status-blocked { color: #ff0000; font-weight: bold; }
    </style>
</head>
<body>
    <div class="container mt-5">
        <h1 class="text-center mb-4">🛡️ SOAR LITE : Dashboard de Sécurité</h1>
        
        <div class="row">
            <div class="col-md-6">
                <div class="card p-4 text-center">
                    <h3>Tentatives Totales</h3>
                    <h1 id="total-attempts" class="display-1">0</h1>
                </div>
            </div>
            <div class="col-md-6">
                <div class="card p-4 text-center">
                    <h3>IPs Bloquées</h3>
                    <h1 id="blocked-count" class="display-1 text-danger">0</h1>
                </div>
            </div>
        </div>

        <div class="mt-5">
            <h3>Log des IPs Bloquées (Temps Réel)</h3>
            <table class="table table-dark">
                <thead><tr><th>Adresse IP</th><th>Action</th></tr></thead>
                <tbody id="ip-table"></tbody>
            </table>
        </div>
    </div>

    <script>
        async function updateDashboard() {
            try {
                const response = await fetch('/api/stats');
                const data = await response.json();
                
                document.getElementById('total-attempts').innerText = data.total_attempts;
                document.getElementById('blocked-count').innerText = data.blocked_ips.length;
                
                const tableBody = document.getElementById('ip-table');
                tableBody.innerHTML = ''; // مسح الجدول وتحديثه
                
                data.blocked_ips.forEach(ip => {
                    let row = `<tr><td>${ip}</td><td class="status-blocked">DROPPED (Firewall)</td></tr>`;
                    tableBody.innerHTML += row;
                });
            } catch (error) { console.error('Erreur Fetch:', error); }
        }

        // تحديث البيانات كل 2 ثانية
        setInterval(updateDashboard, 2000);
        updateDashboard(); // التحديث الأول عند التحميل
    </script>
</body>
</html>
