<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>SOAR Lite | Incident Response Console</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
        body { background-color: #0f0f0f; color: #00ff00; font-family: 'Courier New', Courier, monospace; }
        .card { background-color: #1a1a1a; border: 1px solid #333; }
        .status-blocked { color: #ff4d4d; font-weight: bold; } /* لون أحمر احترافي */
        .header-title { color: #00ff00; text-transform: uppercase; letter-spacing: 2px; }
    </style>
</head>
<body>
    <div class="container mt-5">
        <h1 class="text-center mb-4 header-title">🛡️ Cyber-Sentinel : Console SOAR Automatisée</h1>
        
        <style>
    body { background-color: #0a0a0a; color: #00ff00; font-family: 'Courier New', Courier, monospace; }
    
    /* تحسين شكل البطاقة لزيادة التباين */
    .card { 
        background-color: #121212; 
        border: 1px solid #00ff00; /* إضافة إطار أخضر خفيف */
        box-shadow: 0 0 10px rgba(0, 255, 0, 0.1); /* توهج بسيط */
        border-radius: 8px;
    }

    /* تحسين رؤية العناوين */
    .card h3 { 
        color: #ffffff; /* تغيير اللون للأبيض ليكون مقروءاً جداً */
        font-weight: bold;
        text-transform: uppercase;
        font-size: 1.2rem;
        border-bottom: 1px solid #333; /* خط فاصل بسيط */
        padding-bottom: 10px;
        margin-bottom: 15px;
    }

    .display-1 { 
        font-weight: bold; 
        text-shadow: 2px 2px 5px rgba(0, 0, 0, 0.5); 
    }

    .status-blocked { color: #ff4d4d; font-weight: bold; }
    .header-title { color: #00ff00; text-transform: uppercase; letter-spacing: 3px; font-weight: bold; }
</style>

<div class="row">
    <div class="col-md-6">
        <div class="card p-4 text-center">
            <h3>Flux d'Alertes</h3>
            <h1 id="total-attempts" class="display-1" style="color: #00ff00;">0</h1>
        </div>
    </div>
    <div class="col-md-6">
        <div class="card p-4 text-center">
            <h3>Réactions SOC</h3>
            <h1 id="blocked-count" class="display-1" style="color: #ff0000;">0</h1>
        </div>
    </div>
</div>

        <div class="mt-5">
            <h3>Journal d'Audit des Actions Firewall (Temps Réel)</h3>
            <table class="table table-dark table-hover">
                <thead>
                    <tr>
                        <th>Cible (IP Address)</th>
                        <th>Status de Sécurité</th>
                    </tr>
                </thead>
                <tbody id="ip-table"></tbody>
            </table>
        </div>
    </div>

    <script>
        async function updateDashboard() {
            try {
                const response = await fetch('/api/stats');
                const data = await response.json();
                
                document.getElementById('total-attempts').innerText = data.total_attempts;
                document.getElementById('blocked-count').innerText = data.blocked_ips.length;
                
                const tableBody = document.getElementById('ip-table');
                tableBody.innerHTML = ''; 
                
                data.blocked_ips.forEach(ip => {
                    // كلمة DROPPED تعبر عن احترافية في التعامل مع جدار الحماية
                    let row = `<tr><td>${ip}</td><td class="status-blocked">BLOCKED / IPTABLES_DROP</td></tr>`;
                    tableBody.innerHTML += row;
                });
            } catch (error) { console.error('Erreur Fetch:', error); }
        }

        setInterval(updateDashboard, 2000);
        updateDashboard();
    </script>
</body>
</html>
